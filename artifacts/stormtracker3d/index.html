<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#050a14">
<title>StormTracker 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050a14;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
#c{display:block;width:100%;height:100%}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#alerts-bar{position:absolute;top:0;left:0;right:0;background:rgba(255,30,30,0.88);backdrop-filter:blur(6px);
  color:#fff;font-size:12px;font-weight:600;letter-spacing:.04em;padding:6px 16px;display:none;
  white-space:nowrap;overflow:hidden;border-bottom:1px solid rgba(255,80,80,0.5)}
#alerts-ticker{display:inline-block;animation:ticker 22s linear infinite}
@keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
#info-tl{position:absolute;top:52px;left:12px;background:rgba(5,10,20,0.72);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;min-width:160px;pointer-events:none}
#info-tr{position:absolute;top:52px;right:12px;background:rgba(5,10,20,0.72);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;min-width:150px;text-align:right;pointer-events:none}
.hud-label{font-size:9px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.hud-value{font-size:13px;font-weight:600;color:#e8eef8;line-height:1.3}
.hud-sub{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}
#btn-row{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:all}
#btn-scan{background:rgba(0,180,255,0.18);border:1px solid rgba(0,200,255,0.4);color:#00e5ff;
  border-radius:22px;padding:9px 22px;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;
  backdrop-filter:blur(8px);transition:background .2s;-webkit-tap-highlight-color:transparent}
#btn-scan:hover{background:rgba(0,180,255,0.32)}
#btn-scan:active{background:rgba(0,180,255,0.45)}
#btn-scan.scanning{opacity:.6;cursor:default}
#scan-footer{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(255,255,255,0.28);text-align:center;pointer-events:none;white-space:nowrap}

/* Popup */
#popup{position:fixed;z-index:20;background:rgba(5,10,20,0.93);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 18px;min-width:210px;
  pointer-events:all;display:none;box-shadow:0 8px 40px rgba(0,0,0,0.7)}
#popup-close{position:absolute;top:10px;right:12px;color:rgba(255,255,255,0.35);cursor:pointer;font-size:16px;line-height:1}
#popup-close:hover{color:rgba(255,255,255,0.7)}
.pop-cat{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.pop-dbz{font-size:28px;font-weight:800;margin-bottom:8px;line-height:1}
.pop-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.pop-row:last-child{border-bottom:none}
.pop-k{color:rgba(255,255,255,0.4)}
.pop-v{color:#e8eef8;font-weight:600}

/* Loading */
#loading{position:fixed;inset:0;background:#050a14;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px}
#loading-ring{width:64px;height:64px;border-radius:50%;border:3px solid rgba(0,229,255,0.15);
  border-top-color:#00e5ff;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-title{color:#e8eef8;font-size:16px;font-weight:700;letter-spacing:.12em}
#loading-sub{color:rgba(255,255,255,0.35);font-size:12px;text-align:center;max-width:260px;line-height:1.6}

/* Location search */
#loc-overlay{position:fixed;inset:0;background:rgba(5,10,20,0.96);z-index:25;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px}
#loc-overlay h2{color:#e8eef8;font-size:19px;font-weight:700;letter-spacing:.02em}
#loc-overlay p{color:rgba(255,255,255,0.45);font-size:12px;text-align:center;max-width:290px;line-height:1.6}
#loc-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;
  color:#e8eef8;font-size:14px;padding:11px 16px;width:100%;max-width:320px;outline:none;
  transition:border-color .2s}
#loc-input:focus{border-color:rgba(0,229,255,0.45)}
#loc-btn{background:rgba(0,180,255,0.2);border:1px solid rgba(0,200,255,0.45);color:#00e5ff;
  border-radius:22px;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;
  transition:background .2s}
#loc-btn:hover{background:rgba(0,180,255,0.35)}
#loc-suggestions{width:100%;max-width:320px;max-height:200px;overflow-y:auto}
.loc-sug{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;
  color:#e8eef8;font-size:12px;padding:9px 12px;cursor:pointer;margin-bottom:5px;transition:background .15s;line-height:1.4}
.loc-sug:hover{background:rgba(255,255,255,0.1)}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div id="loading-ring"></div>
  <div id="loading-title">STORMTRACKER 3D</div>
  <div id="loading-sub">Acquiring location...</div>
</div>

<!-- Location fallback overlay -->
<div id="loc-overlay">
  <h2>Enter Location</h2>
  <p>GPS was denied or unavailable. Search for a city to set your position.</p>
  <input id="loc-input" type="text" placeholder="City, State or ZIP code" autocomplete="off">
  <button id="loc-btn">Search</button>
  <div id="loc-suggestions"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="alerts-bar"><span id="alerts-ticker"></span></div>
  <div id="info-tl">
    <div class="hud-label">Location</div>
    <div class="hud-value" id="loc-name">—</div>
    <div class="hud-sub" id="loc-coords">—</div>
    <div style="margin-top:8px" class="hud-label">Radar Source</div>
    <div class="hud-sub" id="radar-src-lbl">—</div>
  </div>
  <div id="info-tr">
    <div class="hud-label">Storm Cells</div>
    <div class="hud-value" id="storm-count">—</div>
    <div class="hud-sub" id="nearest-threat">—</div>
    <div style="margin-top:8px" class="hud-label">Surface Wind</div>
    <div class="hud-sub" id="wind-info">—</div>
  </div>
  <div id="btn-row">
    <button id="btn-scan">⟳ SCAN</button>
  </div>
  <div id="scan-footer" id="scan-footer"></div>
</div>

<!-- Storm popup -->
<div id="popup">
  <span id="popup-close">✕</span>
  <div class="pop-cat" id="pop-cat">—</div>
  <div class="pop-dbz" id="pop-dbz">— dBZ</div>
  <div id="pop-rows"></div>
</div>

<canvas id="c"></canvas>

<!-- Three.js r128 UMD (global THREE.*) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================================================
// GLOBAL STATE
// =====================================================
var ST = {
  lat:null, lon:null, locName:'',
  storms:[], alerts:[], aloftData:[],
  weather:null, stormMovement:null,
  scanTime:null, scanning:false,
  useNexrad:false,
  rvTilePath:null,
  sunriseEpoch:null, sunsetEpoch:null,
  cloudCover:0,
  scanStep:2
};

// Benchmark canvas pixel read speed
(function(){
  try{
    var t0=performance.now();
    var cv=document.createElement('canvas');cv.width=128;cv.height=128;
    var cx=cv.getContext('2d',{willReadFrequently:true});cx.fillRect(0,0,128,128);
    cx.getImageData(0,0,128,128);
    var ms=performance.now()-t0;
    if(ms>40)ST.scanStep=4;
    else if(ms>15)ST.scanStep=3;
    else ST.scanStep=2;
  }catch(e){}
})();

// =====================================================
// MATH UTILS
// =====================================================
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}
function haversineMi(la1,lo1,la2,lo2){
  var R=3958.8;
  var dLa=toRad(la2-la1),dLo=toRad(lo2-lo1);
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function haversineKm(la1,lo1,la2,lo2){return haversineMi(la1,lo1,la2,lo2)*1.60934;}
function bearingDeg(la1,lo1,la2,lo2){
  var dLo=toRad(lo2-lo1);
  var y=Math.sin(dLo)*Math.cos(toRad(la2));
  var x=Math.cos(toRad(la1))*Math.sin(toRad(la2))-Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(dLo);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
// Lat/lon → 3D scene coords. 1 unit ≈ 1 km. North=-Z, East=+X, Up=+Y
function geoToScene(lat,lon){
  var R=6371;
  var dLa=toRad(lat-ST.lat);
  var dLo=toRad(lon-ST.lon);
  var avgLa=toRad((lat+ST.lat)/2);
  return{x:dLo*R*Math.cos(avgLa), z:-dLa*R};
}

// =====================================================
// THREE.JS SCENE
// =====================================================
var renderer,camera,scene,controls,raycaster,mouse,clock;
var skyDome,skyMat;
var stormGroup,windGroup,coneGroup,compassGroup;
var ambientLight,sunLight;
var stormMeshes=[]; // {mesh, cell, lights[], rainSystem, lightningTimer}
var windSystems=[];  // {points, spdMs, dir, sceneR, altY}

function initScene(){
  var cv=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:false,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x0a1525,0.0016);

  camera=new THREE.PerspectiveCamera(72,window.innerWidth/window.innerHeight,0.001,1000);
  camera.position.set(0,0.0015,0);
  camera.lookAt(0,0.5,-15);

  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.07;
  controls.screenSpacePanning=false;
  controls.minDistance=0.002;controls.maxDistance=250;
  controls.maxPolarAngle=Math.PI*0.502; // slightly below horizon
  controls.target.set(0,0.4,-6);
  controls.update();

  raycaster=new THREE.Raycaster();
  mouse=new THREE.Vector2();
  clock=new THREE.Clock();

  // Lighting
  ambientLight=new THREE.AmbientLight(0x1a2535,0.7);scene.add(ambientLight);
  sunLight=new THREE.DirectionalLight(0xffd080,0.5);sunLight.position.set(60,90,60);scene.add(sunLight);
  // Fill light
  var fill=new THREE.DirectionalLight(0x2244aa,0.2);fill.position.set(-40,30,-40);scene.add(fill);

  // Groups
  stormGroup=new THREE.Group();scene.add(stormGroup);
  windGroup=new THREE.Group();scene.add(windGroup);
  coneGroup=new THREE.Group();scene.add(coneGroup);
  compassGroup=new THREE.Group();scene.add(compassGroup);

  buildGround();
  buildSky();
  buildCompass();
  buildUserMarker();

  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
  cv.addEventListener('click',onCanvasClick);
  cv.addEventListener('touchend',function(e){
    e.preventDefault();
    if(e.changedTouches.length)onCanvasClick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});
  },{passive:false});
}

// =====================================================
// GROUND
// =====================================================
function buildGround(){
  // Grid texture
  var sz=512,cv2=document.createElement('canvas');cv2.width=sz;cv2.height=sz;
  var cx=cv2.getContext('2d');
  cx.fillStyle='#07111e';cx.fillRect(0,0,sz,sz);
  cx.strokeStyle='rgba(0,160,230,0.10)';cx.lineWidth=1;
  for(var i=0;i<=8;i++){
    var p=i*(sz/8);
    cx.beginPath();cx.moveTo(p,0);cx.lineTo(p,sz);cx.stroke();
    cx.beginPath();cx.moveTo(0,p);cx.lineTo(sz,p);cx.stroke();
  }
  var g=cx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2.2);
  g.addColorStop(0,'rgba(0,160,230,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g;cx.fillRect(0,0,sz,sz);

  var tex=new THREE.CanvasTexture(cv2);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(50,50);
  var geo=new THREE.PlaneGeometry(800,800);
  var mat=new THREE.MeshLambertMaterial({map:tex});
  var plane=new THREE.Mesh(geo,mat);
  plane.rotation.x=-Math.PI/2;plane.position.y=0;
  scene.add(plane);
}

// =====================================================
// SKY
// =====================================================
function buildSky(){
  var geo=new THREE.SphereGeometry(750,32,16);
  skyMat=new THREE.ShaderMaterial({
    uniforms:{
      uTop:{value:new THREE.Color(0x020612)},
      uHorizon:{value:new THREE.Color(0x0a1d3a)},
      uGround:{value:new THREE.Color(0x040a12)},
      uExp:{value:0.55}
    },
    vertexShader:`
      varying vec3 vPos;
      void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}
    `,
    fragmentShader:`
      uniform vec3 uTop,uHorizon,uGround;uniform float uExp;
      varying vec3 vPos;
      void main(){
        float h=normalize(vPos).y;
        vec3 sky=mix(uHorizon,uTop,pow(clamp(h,0.,1.),uExp));
        gl_FragColor=vec4(mix(uGround,sky,step(0.,h)),1.);
      }
    `,
    side:THREE.BackSide,depthWrite:false
  });
  skyDome=new THREE.Mesh(geo,skyMat);scene.add(skyDome);
}

function refreshSky(){
  var now=Date.now()/1000;
  var rise=ST.sunriseEpoch||0,set=ST.sunsetEpoch||0;
  var cloud=Math.min(1,(ST.cloudCover||0)/100);
  var topC=new THREE.Color(),horizC=new THREE.Color(),groundC=new THREE.Color(0x040a12);

  if(!rise||!set||now<rise-3600||now>set+3600){
    // Night
    topC.setHex(0x010408);horizC.setHex(0x050e20);
    sunLight.intensity=0.04;sunLight.color.setHex(0x3355aa);ambientLight.intensity=0.25;
  } else if(now<rise+2400){
    // Dawn
    var d=Math.max(0,Math.min(1,(now-rise+3600)/5000));
    topC.lerpColors(new THREE.Color(0x010408),new THREE.Color(0x0c2255),d);
    horizC.lerpColors(new THREE.Color(0x6b1a10),new THREE.Color(0x1a3a68),d);
    sunLight.intensity=0.08+d*0.45;sunLight.color.setHex(0xff8844);ambientLight.intensity=0.35+d*0.35;
  } else if(now<set-2400){
    // Day
    topC.setHex(0x073060);horizC.setHex(0x1c4070);
    sunLight.intensity=Math.max(0.1,0.7-cloud*0.45);
    sunLight.color.setHex(0xffe8b0);ambientLight.intensity=Math.max(0.4,0.9-cloud*0.4);
  } else {
    // Dusk
    var d=Math.max(0,Math.min(1,1-(now-(set-2400))/4200));
    topC.lerpColors(new THREE.Color(0x010408),new THREE.Color(0x0c2255),d);
    horizC.lerpColors(new THREE.Color(0x6b1a10),new THREE.Color(0x1a3a68),d);
    sunLight.intensity=0.08+d*0.45;sunLight.color.setHex(0xff6030);ambientLight.intensity=0.35+d*0.35;
  }

  if(cloud>0.2){
    topC.lerp(new THREE.Color(0x111820),cloud*0.65);
    horizC.lerp(new THREE.Color(0x14202e),cloud*0.55);
  }
  skyMat.uniforms.uTop.value.copy(topC);
  skyMat.uniforms.uHorizon.value.copy(horizC);
  skyMat.uniforms.uGround.value.copy(groundC);
  scene.fog.color.copy(horizC);
}

// =====================================================
// COMPASS
// =====================================================
function makeSprite(text,color,scale){
  var cv2=document.createElement('canvas');cv2.width=128;cv2.height=64;
  var cx=cv2.getContext('2d');
  cx.clearRect(0,0,128,64);
  cx.font='bold 38px Segoe UI,Arial,sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.shadowColor='rgba(0,0,0,0.9)';cx.shadowBlur=10;
  cx.fillStyle=color||'rgba(255,255,255,0.5)';
  cx.fillText(text,64,32);
  var tex=new THREE.CanvasTexture(cv2);
  var mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  var spr=new THREE.Sprite(mat);
  spr.scale.set((scale||1)*4.5,(scale||1)*2.2,1);
  return spr;
}

function buildCompass(){
  var R=90;
  var dirs=[{t:'N',b:0,main:true},{t:'NE',b:45,main:false},{t:'E',b:90,main:true},{t:'SE',b:135,main:false},
            {t:'S',b:180,main:true},{t:'SW',b:225,main:false},{t:'W',b:270,main:true},{t:'NW',b:315,main:false}];
  dirs.forEach(function(d){
    var ar=toRad(d.b);
    var spr=makeSprite(d.t,d.main?'rgba(0,229,255,0.85)':'rgba(255,255,255,0.3)',d.main?1:0.6);
    spr.position.set(R*Math.sin(ar),d.main?1.8:0.9,-R*Math.cos(ar));
    compassGroup.add(spr);

    // Range rings - tick marks at N,S,E,W
    if(d.main){
      var geo=new THREE.CylinderGeometry(0.05,0.05,0.6,8);
      var mat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.3});
      var tick=new THREE.Mesh(geo,mat);
      tick.position.set(R*Math.sin(ar)*0.98,0.3,-R*Math.cos(ar)*0.98);
      compassGroup.add(tick);
    }
  });

  // 50km range ring on ground
  [25,50,100].forEach(function(km,i){
    var pts=[];
    for(var a=0;a<=64;a++){var ar2=a/64*Math.PI*2;pts.push(new THREE.Vector3(km*Math.sin(ar2),0.02,km*Math.cos(ar2)));}
    var geo2=new THREE.BufferGeometry().setFromPoints(pts);
    var mat2=new THREE.LineBasicMaterial({color:0x1a3050,transparent:true,opacity:0.4-i*0.1});
    scene.add(new THREE.LineLoop(geo2,mat2));
  });

  // Range labels
  ['25 km','50 km','100 km'].forEach(function(lbl,i){
    var r=[25,50,100][i];
    var spr2=makeSprite(lbl,'rgba(0,160,200,0.35)',0.35);
    spr2.position.set(r,0.1,0);
    scene.add(spr2);
  });
}

// =====================================================
// USER MARKER
// =====================================================
function buildUserMarker(){
  // Static ring
  var geo=new THREE.RingGeometry(0.055,0.095,40);
  var mat=new THREE.MeshBasicMaterial({color:0x00e5ff,side:THREE.DoubleSide,transparent:true,opacity:0.75});
  var ring=new THREE.Mesh(geo,mat);ring.rotation.x=-Math.PI/2;ring.position.y=0.002;scene.add(ring);

  // Center dot
  var dgeo=new THREE.CircleGeometry(0.03,24);
  var dmat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.9,side:THREE.DoubleSide});
  var dot=new THREE.Mesh(dgeo,dmat);dot.rotation.x=-Math.PI/2;dot.position.y=0.002;scene.add(dot);

  // Pulse ring
  var pgeo=new THREE.RingGeometry(0.055,0.12,40);
  var pmat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.25,side:THREE.DoubleSide});
  var pulse=new THREE.Mesh(pgeo,pmat);pulse.rotation.x=-Math.PI/2;pulse.position.y=0.0025;scene.add(pulse);

  var t=0;
  (function tick(){
    requestAnimationFrame(tick);
    t+=0.018;
    pulse.scale.setScalar(1+0.5*Math.abs(Math.sin(t)));
    pmat.opacity=0.22*(1.1-Math.abs(Math.sin(t))*0.4);
  })();
}

// =====================================================
// dBZ HELPERS
// =====================================================
function dbzCat(dbz){
  if(dbz>=65)return{name:'Extreme',col:'#cc00ff'};
  if(dbz>=55)return{name:'Severe',col:'#ff1111'};
  if(dbz>=45)return{name:'Heavy',col:'#ff7700'};
  if(dbz>=35)return{name:'Moderate',col:'#ffee00'};
  if(dbz>=25)return{name:'Light',col:'#00cc44'};
  return{name:'Trace',col:'#005500'};
}
function dbzHex(dbz){return dbzCat(dbz).col;}
function dbzInt3(dbz){return Math.max(0.3,Math.min(2.5,(dbz-15)/30));}

// =====================================================
// COLOR → dBZ MAPPINGS
// =====================================================
// RainViewer: RGB → dBZ via HSV hue
function rvToDbz(r,g,b,a){
  if(a<28)return-99;
  var max=Math.max(r,g,b),min=Math.min(r,g,b),delta=max-min;
  if(delta<18||max<35)return-99;
  var h;
  if(max===r)h=((g-b)/delta+6)%6;
  else if(max===g)h=(b-r)/delta+2;
  else h=(r-g)/delta+4;
  h=(h*60)%360;
  if(h>=200&&h<265)return 20;
  if(h>=155&&h<200)return 28;
  if(h>=95&&h<155)return 36;
  if(h>=55&&h<95)return 44;
  if(h>=20&&h<55)return 52;
  if((h>=0&&h<20)||(h>=335&&h<360))return 60;
  if(h>=265&&h<335)return 68;
  return 28;
}

// IEM NEXRAD N0Q: standard NWS color table approximation
function nexradToDbz(r,g,b,a){
  if(a<18)return-99;
  if(r<8&&g<8&&b<8)return-99;
  // Map known color bands to dBZ ranges
  var lum=r*0.299+g*0.587+b*0.114;
  if(lum<8)return-99;
  // Purple/magenta (extreme, ≥65)
  if(r>130&&b>100&&g<40)return 68;
  if(r>190&&g<25&&b>80)return 65;
  // Dark red (≥60)
  if(r>120&&g<18&&b<18)return 62;
  // Red (≥55)
  if(r>170&&g<50&&b<50)return 57;
  // Orange (≥45)
  if(r>200&&g>80&&g<160&&b<40)return 48;
  // Yellow (≥35)
  if(r>180&&g>180&&b<70)return 38;
  // Yellow-green (≥30)
  if(g>160&&r>100&&b<80)return 32;
  // Green (≥25)
  if(g>120&&r<80&&b<80)return 27;
  // Dark green (≥20)
  if(g>60&&r<50&&b<60)return 22;
  // Cyan / light blue (≥15)
  if(b>100&&g>100&&r<60)return 17;
  // Fallback by luminance
  if(lum<30)return 15;
  return Math.max(15,Math.min(50,15+lum/5));
}

// =====================================================
// PNG BINARY DECODER (for RainViewer; bypasses CORS)
// =====================================================
async function decodeRvRgba(buf){
  var v=new DataView(buf);
  if(buf.byteLength<29)throw new Error('too small');
  var o=8,w=0,h=0,ct=0,idats=[];
  while(o+8<=v.byteLength){
    var len=v.getUint32(o);
    if(len>buf.byteLength)break;
    var tag=String.fromCharCode(v.getUint8(o+4),v.getUint8(o+5),v.getUint8(o+6),v.getUint8(o+7));
    if(tag==='IHDR'&&o+17<v.byteLength){w=v.getUint32(o+8);h=v.getUint32(o+12);ct=v.getUint8(o+17);}
    else if(tag==='IDAT'&&o+8+len<=v.byteLength)idats.push(new Uint8Array(buf,o+8,len));
    else if(tag==='IEND')break;
    o+=12+len;if(o<0)break;
  }
  var total=idats.reduce(function(s,c){return s+c.length;},0);
  var comp=new Uint8Array(total);var p=0;
  idats.forEach(function(c){comp.set(c,p);p+=c.length;});
  var ds=new DecompressionStream('deflate');
  var wr=ds.writable.getWriter();wr.write(comp);wr.close();
  var rd=ds.readable.getReader();var chunks=[];
  while(true){var rr=await rd.read();if(rr.done)break;chunks.push(rr.value);}
  var dLen=chunks.reduce(function(s,c){return s+c.length;},0);
  var raw=new Uint8Array(dLen);p=0;chunks.forEach(function(c){raw.set(c,p);p+=c.length;});
  var bpp=ct===6?4:ct===2?3:ct===4?2:1;
  var stride=w*bpp;
  if(!w||!h||dLen<h*(stride+1))throw new Error('bad dims');
  var rgba=new Uint8Array(w*h*4);
  var prev=new Uint8Array(stride);
  for(var y=0;y<h;y++){
    var fi=y*(stride+1);
    if(fi+1+stride>raw.length)break;
    var fl=raw[fi];
    var line=new Uint8Array(stride);
    for(var x=0;x<stride;x++){
      var val=raw[fi+1+x];
      var aa=x>=bpp?line[x-bpp]:0,bb=prev[x],cc=x>=bpp?prev[x-bpp]:0;
      if(fl===1)val=(val+aa)&255;
      else if(fl===2)val=(val+bb)&255;
      else if(fl===3)val=(val+((aa+bb)>>1))&255;
      else if(fl===4){var pa=Math.abs(bb-cc),pb=Math.abs(aa-cc),pc=Math.abs(aa+bb-2*cc);
        val=(val+(pa<=pb&&pa<=pc?aa:pb<=pc?bb:cc))&255;}
      line[x]=val;
    }
    for(var xi=0;xi<w;xi++){
      var di=(y*w+xi)*4;
      if(bpp===4){rgba[di]=line[xi*4];rgba[di+1]=line[xi*4+1];rgba[di+2]=line[xi*4+2];rgba[di+3]=line[xi*4+3];}
      else if(bpp===3){rgba[di]=line[xi*3];rgba[di+1]=line[xi*3+1];rgba[di+2]=line[xi*3+2];rgba[di+3]=255;}
      else if(bpp===2){rgba[di]=rgba[di+1]=rgba[di+2]=line[xi*2];rgba[di+3]=line[xi*2+1];}
      else{rgba[di]=rgba[di+1]=rgba[di+2]=line[xi];rgba[di+3]=255;}
    }
    prev.set(line);
  }
  return{w:w,h:h,data:rgba};
}

// =====================================================
// TILE MATH
// =====================================================
function lonToTile(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z));}
function latToTile(lat,z){var lr=toRad(lat);return Math.floor((1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*Math.pow(2,z));}
function tilePixelLatLon(tx,ty,x,y,w,z){
  var frac=Math.pow(2,z);
  var lon=(tx+x/w)*360/frac-180;
  var latR=Math.atan(Math.sinh(Math.PI*(1-2*(ty+y/w)/frac)));
  return{lat:latR*180/Math.PI,lon:lon};
}

function loadImgCors(url){
  return new Promise(function(res){
    var img=new Image();img.crossOrigin='anonymous';
    img.onload=function(){res(img);};img.onerror=function(){res(null);};
    img.src=url;
  });
}

async function scanTileNEXRAD(url,tx,ty,zoom){
  try{
    var img=await loadImgCors(url);if(!img)return[];
    var cv2=document.createElement('canvas');cv2.width=256;cv2.height=256;
    var ctx=cv2.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0);
    var imgd=ctx.getImageData(0,0,256,256).data;
    var pts=[];var step=ST.scanStep;
    for(var px=0;px<256;px+=step)for(var py=0;py<256;py+=step){
      var i=(py*256+px)*4;
      var dbz=nexradToDbz(imgd[i],imgd[i+1],imgd[i+2],imgd[i+3]);
      if(dbz<15)continue;
      var ll=tilePixelLatLon(tx,ty,px,py,256,zoom);
      var dist=haversineMi(ST.lat,ST.lon,ll.lat,ll.lon);
      if(dist<=90)pts.push({lat:ll.lat,lon:ll.lon,dbz:dbz,dist:dist});
    }
    return pts;
  }catch(e){return[];}
}

async function scanTileRV(url,tx,ty,zoom){
  try{
    var res=await fetch(url,{signal:AbortSignal.timeout(9000)});
    if(!res.ok)return[];
    var buf=await res.arrayBuffer();
    var dec=await decodeRvRgba(buf);
    var pts=[];var step=ST.scanStep;
    for(var px=0;px<dec.w;px+=step)for(var py=0;py<dec.h;py+=step){
      var i=(py*dec.w+px)*4;
      var dbz=rvToDbz(dec.data[i],dec.data[i+1],dec.data[i+2],dec.data[i+3]);
      if(dbz<15)continue;
      var ll=tilePixelLatLon(tx,ty,px,py,dec.w,zoom);
      var dist=haversineMi(ST.lat,ST.lon,ll.lat,ll.lon);
      if(dist<=90)pts.push({lat:ll.lat,lon:ll.lon,dbz:dbz,dist:dist});
    }
    return pts;
  }catch(e){return[];}
}

// =====================================================
// STORM CLUSTERING
// =====================================================
function clusterStorms(rawPts){
  if(!rawPts||!rawPts.length)return[];
  rawPts.sort(function(a,b){return b.dbz-a.dbz;});
  var out=[];
  rawPts.forEach(function(p){
    if(p.dbz<18)return;
    var minR=p.dbz>=55?3:p.dbz>=45?5:p.dbz>=35?7:10;
    for(var i=0;i<out.length;i++){
      if(haversineMi(p.lat,p.lon,out[i].lat,out[i].lon)<minR){
        if(p.dbz>out[i].dbz){out[i].lat=p.lat;out[i].lon=p.lon;out[i].dbz=p.dbz;}
        out[i].count=(out[i].count||1)+1;return;
      }
    }
    var dist=haversineMi(ST.lat,ST.lon,p.lat,p.lon);
    var bear=bearingDeg(ST.lat,ST.lon,p.lat,p.lon);
    out.push({lat:p.lat,lon:p.lon,dbz:p.dbz,distance:dist,bearing:bear,count:1});
  });
  return out.sort(function(a,b){return a.distance-b.distance;});
}

// =====================================================
// DATA APIS
// =====================================================
function isUS(lat,lon){return lat>=24&&lat<=50&&lon>=-125&&lon<=-66;}

async function fetchRVPath(){
  try{
    var r=await fetch('https://api.rainviewer.com/public/weather-maps.json',{signal:AbortSignal.timeout(8000)});
    var d=await r.json();var frames=(d.radar&&d.radar.past?d.radar.past:[]).concat(d.radar&&d.radar.nowcast?d.radar.nowcast:[]);
    ST.rvTilePath=frames.length?frames[frames.length-1].path:null;
    return!!ST.rvTilePath;
  }catch(e){ST.rvTilePath=null;return false;}
}

async function fetchOpenMeteo(){
  try{
    var url='https://api.open-meteo.com/v1/forecast?latitude='+ST.lat+'&longitude='+ST.lon+
      '&current=temperature_2m,cloud_cover,precipitation,wind_speed_10m,wind_direction_10m'+
      '&hourly=wind_speed_925hPa,wind_direction_925hPa,wind_speed_850hPa,wind_direction_850hPa,'+
      'wind_speed_700hPa,wind_direction_700hPa,wind_speed_500hPa,wind_direction_500hPa'+
      '&daily=sunrise,sunset&wind_speed_unit=ms&forecast_days=1&timezone=auto';
    var r=await fetch(url,{signal:AbortSignal.timeout(10000)});
    var d=await r.json();
    var cur=d.current||{};
    ST.cloudCover=cur.cloud_cover||0;
    ST.weather=cur;
    // Sunrise/sunset
    if(d.daily&&d.daily.sunrise&&d.daily.sunrise[0]){
      ST.sunriseEpoch=new Date(d.daily.sunrise[0]).getTime()/1000;
      ST.sunsetEpoch=new Date(d.daily.sunset[0]).getTime()/1000;
    }
    // Winds aloft
    var h=d.hourly||{};
    var hr=new Date().getHours();
    var levels=[
      {p:1013,yk:'wind_speed_10m',dk:'wind_direction_10m',alt:0.05,sfc:true},
      {p:925,yk:'wind_speed_925hPa',dk:'wind_direction_925hPa',alt:0.75},
      {p:850,yk:'wind_speed_850hPa',dk:'wind_direction_850hPa',alt:1.5},
      {p:700,yk:'wind_speed_700hPa',dk:'wind_direction_700hPa',alt:3.0},
      {p:500,yk:'wind_speed_500hPa',dk:'wind_direction_500hPa',alt:5.5}
    ];
    ST.aloftData=[];
    levels.forEach(function(lv){
      var spd,dir;
      if(lv.sfc){spd=cur.wind_speed_10m;dir=cur.wind_direction_10m;}
      else{spd=h[lv.yk]?h[lv.yk][hr]||h[lv.yk][0]:null;dir=h[lv.dk]?h[lv.dk][hr]||h[lv.dk][0]:null;}
      if(spd!=null&&dir!=null)ST.aloftData.push({p:lv.p,spdMs:spd,dir:dir,altKm:lv.alt,sfc:!!lv.sfc});
    });
    // Storm steering: use 700mb if available
    var steer=ST.aloftData.find(function(a){return a.p===700;})||ST.aloftData[ST.aloftData.length-1];
    if(steer)ST.stormMovement={speed:steer.spdMs*2.237,direction:steer.dir};
    return true;
  }catch(e){console.warn('Open-Meteo fail:',e);return false;}
}

async function fetchNWSAlerts(){
  if(!isUS(ST.lat,ST.lon)){ST.alerts=[];return;}
  try{
    var r=await fetch('https://api.weather.gov/alerts/active?point='+ST.lat+','+ST.lon,
      {signal:AbortSignal.timeout(8000),headers:{'User-Agent':'StormTracker3D/1.0 (weather app)'}});
    var d=await r.json();
    ST.alerts=(d.features||[]).map(function(f){
      var p=f.properties||{};return{event:p.event||'',headline:p.headline||'',severity:p.severity||'Minor'};
    }).filter(function(a){return a.event;});
  }catch(e){ST.alerts=[];}
}

async function geocodeReverse(lat,lon){
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&zoom=10',
      {signal:AbortSignal.timeout(7000),headers:{'User-Agent':'StormTracker3D/1.0'}});
    var d=await r.json();var a=d.address||{};
    return a.city||a.town||a.village||a.county||a.state||'Unknown Location';
  }catch(e){return'Unknown Location';}
}

async function geocodeSearch(q){
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=5',
      {signal:AbortSignal.timeout(8000),headers:{'User-Agent':'StormTracker3D/1.0'}});
    return await r.json();
  }catch(e){return[];}
}

// =====================================================
// MAIN SCAN ROUTINE
// =====================================================
function setLoadingMsg(msg){var el=document.getElementById('loading-sub');if(el)el.textContent=msg;}

async function runScan(){
  if(ST.scanning||!ST.lat)return;
  ST.scanning=true;
  var btnEl=document.getElementById('btn-scan');
  btnEl.classList.add('scanning');btnEl.textContent='⟳ SCANNING…';

  try{
    ST.useNexrad=isUS(ST.lat,ST.lon);
    document.getElementById('radar-src-lbl').textContent=ST.useNexrad?'NEXRAD (IEM)':'RainViewer';

    // Parallel fetch
    var fetches=[fetchOpenMeteo(),fetchNWSAlerts()];
    if(!ST.useNexrad)fetches.push(fetchRVPath());
    await Promise.all(fetches);

    refreshSky();

    // Tile scan
    var zoom=8;
    var tx0=lonToTile(ST.lon,zoom),ty0=latToTile(ST.lat,zoom);
    var pad=2;
    var tileJobs=[];
    for(var tx=tx0-pad;tx<=tx0+pad;tx++){for(var ty=ty0-pad;ty<=ty0+pad;ty++){
      if(ST.useNexrad){
        var url='https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/'+zoom+'/'+tx+'/'+ty+'.png?ts='+Date.now();
        tileJobs.push(scanTileNEXRAD(url,tx,ty,zoom));
      } else {
        if(!ST.rvTilePath)continue;
        var url='https://tilecache.rainviewer.com'+ST.rvTilePath+'/256/'+zoom+'/'+tx+'/'+ty+'/2/1_1.png';
        tileJobs.push(scanTileRV(url,tx,ty,zoom));
      }
    }}
    var results=await Promise.all(tileJobs);
    var rawPts=[];results.forEach(function(r){rawPts=rawPts.concat(r);});
    ST.storms=clusterStorms(rawPts);
    ST.scanTime=Date.now();

    rebuildStorms();
    rebuildWind();
    refreshHUD();
    refreshAlerts();
  }catch(e){console.error('Scan fail:',e);}

  ST.scanning=false;
  btnEl.classList.remove('scanning');btnEl.textContent='⟳ SCAN';
}

// =====================================================
// 3D: STORM CLOUDS
// =====================================================
function clearStorms(){
  stormMeshes.forEach(function(sm){
    if(sm.ltTimer)clearInterval(sm.ltTimer);
  });
  stormMeshes=[];
  while(stormGroup.children.length>0)stormGroup.remove(stormGroup.children[0]);
  while(coneGroup.children.length>0)coneGroup.remove(coneGroup.children[0]);
}

function makeCloudGroup(dbz){
  var grp=new THREE.Group();
  var baseR=Math.max(1.2,Math.min(9,(dbz-10)/6));
  var n=4+Math.floor(dbz/10);
  var cmat=new THREE.MeshLambertMaterial({color:new THREE.Color(0.82,0.84,0.9),transparent:true,opacity:0.74});
  for(var i=0;i<n;i++){
    var r=baseR*(0.45+Math.random()*0.65);
    var m=new THREE.Mesh(new THREE.SphereGeometry(r,7,5),cmat);
    var ang=i/n*Math.PI*2;var sp=baseR*0.6;
    m.position.set(Math.cos(ang)*sp*(0.3+Math.random()*0.7),r*0.25*Math.random(),Math.sin(ang)*sp*(0.3+Math.random()*0.7));
    grp.add(m);
  }
  if(dbz>=50){
    var am=new THREE.Mesh(new THREE.CylinderGeometry(baseR*1.5,baseR*0.7,baseR*0.35,14),
      new THREE.MeshLambertMaterial({color:0xbbbbcc,transparent:true,opacity:0.45}));
    am.position.y=baseR*1.1;grp.add(am);
  }
  return{grp:grp,r:baseR};
}

function makeRain(dbz,r){
  var n=200+dbz*7,pos=new Float32Array(n*3),vel=new Float32Array(n);
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,d=Math.random()*r*1.3;
    pos[i*3]=Math.cos(a)*d;pos[i*3+1]=-Math.random()*r*2;pos[i*3+2]=Math.sin(a)*d;
    vel[i]=0.018+Math.random()*0.035;
  }
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var mat=new THREE.PointsMaterial({color:0x88aacc,size:0.09,transparent:true,opacity:0.45,sizeAttenuation:true,depthWrite:false});
  var pts=new THREE.Points(geo,mat);
  pts.userData={vel:vel,r:r};
  return pts;
}

function animRain(rain,windDir){
  if(!rain)return;
  var pos=rain.geometry.attributes.position.array;
  var vel=rain.userData.vel,r=rain.userData.r;
  var wd=toRad(windDir||0);
  var dx=Math.sin(wd)*0.0015,dz=-Math.cos(wd)*0.0015;
  for(var i=0;i<vel.length;i++){
    pos[i*3]+=dx;pos[i*3+1]-=vel[i];pos[i*3+2]+=dz;
    if(pos[i*3+1]<-r*2.8){
      var a=Math.random()*Math.PI*2,d=Math.random()*r;
      pos[i*3]=Math.cos(a)*d;pos[i*3+1]=r*0.4+Math.random()*r*0.4;pos[i*3+2]=Math.sin(a)*d;
    }
  }
  rain.geometry.attributes.position.needsUpdate=true;
}

function addApproachCone(cell,sp){
  if(!ST.stormMovement||ST.stormMovement.speed<3)return;
  var mv=ST.stormMovement;
  var bearToUser=(cell.bearing+180)%360;
  var diff=Math.abs(((mv.direction-bearToUser+180)%360)-180);
  if(diff>75)return;

  var dkm=haversineKm(ST.lat,ST.lon,cell.lat,cell.lon);
  var spdKmh=mv.speed*1.609;
  var etaMin=spdKmh>0.5?Math.round(dkm/(spdKmh/60)):null;

  var cLen=Math.min(55,dkm*0.65);
  var cW=Math.max(3,cLen*0.18);
  var mRad=toRad(mv.direction);
  var col=new THREE.Color(dbzHex(cell.dbz));

  var cGeo=new THREE.ConeGeometry(cW,cLen,14,1,true);
  var cMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.09,side:THREE.DoubleSide});
  var cone=new THREE.Mesh(cGeo,cMat);
  cone.position.set(sp.x,0.05,sp.z);
  cone.rotation.z=Math.PI/2;cone.rotation.y=-mRad+Math.PI;
  coneGroup.add(cone);

  var wMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.2,wireframe:true});
  var wire=new THREE.Mesh(cGeo,wMat);
  wire.position.copy(cone.position);wire.rotation.copy(cone.rotation);
  coneGroup.add(wire);

  // Motion arrow
  var aLen=Math.min(18,dkm*0.25);
  if(aLen>2){
    var aGeo=new THREE.CylinderGeometry(0.07,0.28,aLen,7);
    var aMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.38});
    var arrow=new THREE.Mesh(aGeo,aMat);
    arrow.position.set(sp.x+Math.sin(mRad)*aLen*0.5,0.03,sp.z-Math.cos(mRad)*aLen*0.5);
    arrow.rotation.z=Math.PI/2;arrow.rotation.y=-mRad;
    coneGroup.add(arrow);
  }

  // ETA label
  if(etaMin&&etaMin>0&&etaMin<180){
    var eSpr=makeSprite('ETA '+etaMin+'min','rgba(255,200,55,0.92)',0.5);
    eSpr.position.set(sp.x,dkm*0.12+3.5,sp.z);coneGroup.add(eSpr);
  }
}

function rebuildStorms(){
  clearStorms();
  var surfWind=ST.weather?ST.weather.wind_direction_10m||0:0;
  ST.storms.slice(0,24).forEach(function(cell){
    var sp=geoToScene(cell.lat,cell.lon);
    var dkm=haversineKm(ST.lat,ST.lon,cell.lat,cell.lon);
    var alt=Math.max(0.6,dkm*0.045);
    var cl=makeCloudGroup(cell.dbz);
    cl.grp.position.set(sp.x,alt,sp.z);
    cl.grp.userData.cell=cell;
    stormGroup.add(cl.grp);

    // Glow light
    var glowCol=new THREE.Color(dbzHex(cell.dbz));
    var pt=new THREE.PointLight(glowCol,dbzInt3(cell.dbz)*1.3,dkm*0.14+9);
    pt.position.set(sp.x,alt-cl.r*0.4,sp.z);
    stormGroup.add(pt);

    // Ground disc
    var disc=new THREE.Mesh(new THREE.CircleGeometry(cl.r*1.4,24),
      new THREE.MeshBasicMaterial({color:glowCol,transparent:true,opacity:0.07,side:THREE.DoubleSide,depthWrite:false}));
    disc.rotation.x=-Math.PI/2;disc.position.set(sp.x,0.01,sp.z);stormGroup.add(disc);

    // Rain
    var rain=makeRain(cell.dbz,cl.r);
    rain.position.set(sp.x,alt-cl.r*0.25,sp.z);stormGroup.add(rain);

    // Lightning
    var ltTimer=null;
    if(cell.dbz>=45){
      var sx=sp.x,sz2=sp.z,altRef=alt,rr=cl.r;
      ltTimer=setInterval(function(){
        if(Math.random()<0.28){
          var fl=new THREE.PointLight(0xddeeff,9,rr*3.5);
          fl.position.set(sx+(Math.random()-.5)*rr,altRef+Math.random()*0.5,sz2+(Math.random()-.5)*rr);
          stormGroup.add(fl);
          setTimeout(function(){stormGroup.remove(fl);},55+Math.random()*70);
          setTimeout(function(){var fl2=new THREE.PointLight(0xddeeff,5,rr*2);fl2.position.copy(fl.position);stormGroup.add(fl2);setTimeout(function(){stormGroup.remove(fl2);},35);},80);
        }
      },600+Math.random()*2200);
    }

    // Storm label sprite
    var cat=dbzCat(cell.dbz);
    var lbl=makeSprite(Math.round(cell.dbz)+' dBZ',cat.col,0.4);
    lbl.position.set(sp.x,alt+cl.r+0.8,sp.z);stormGroup.add(lbl);

    stormMeshes.push({mesh:cl.grp,cell:cell,lights:[pt],rain:rain,ltTimer:ltTimer});
    addApproachCone(cell,sp);
  });
}

// =====================================================
// 3D: WIND PARTICLES
// =====================================================
function rebuildWind(){
  while(windGroup.children.length>0)windGroup.remove(windGroup.children[0]);
  windSystems=[];
  if(!ST.aloftData||!ST.aloftData.length)return;
  var R=130;
  ST.aloftData.forEach(function(lv,i){
    var n=500;var pos=new Float32Array(n*3);
    for(var j=0;j<n;j++){
      pos[j*3]=(Math.random()-.5)*R*2;
      pos[j*3+1]=lv.altKm+Math.random()*lv.altKm*0.2;
      pos[j*3+2]=(Math.random()-.5)*R*2;
    }
    var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    var mat=new THREE.PointsMaterial({
      color:lv.sfc?0x6688bb:0x4477aa,
      size:lv.sfc?0.14:0.20+i*0.04,
      transparent:true,opacity:lv.sfc?0.10:0.16,
      sizeAttenuation:true,depthWrite:false
    });
    var pts=new THREE.Points(geo,mat);windGroup.add(pts);
    windSystems.push({pts:pts,spdMs:lv.spdMs,dir:lv.dir,R:R});
  });
}

function animWind(){
  windSystems.forEach(function(ws){
    var pos=ws.pts.geometry.attributes.position.array;
    var n=pos.length/3;
    var dr=toRad(ws.dir);
    var spd=ws.spdMs*0.0006;
    var dx=Math.sin(dr)*spd,dz=-Math.cos(dr)*spd;
    for(var i=0;i<n;i++){
      pos[i*3]+=dx;pos[i*3+2]+=dz;
      if(pos[i*3]>ws.R)pos[i*3]-=ws.R*2;
      if(pos[i*3]<-ws.R)pos[i*3]+=ws.R*2;
      if(pos[i*3+2]>ws.R)pos[i*3+2]-=ws.R*2;
      if(pos[i*3+2]<-ws.R)pos[i*3+2]+=ws.R*2;
    }
    ws.pts.geometry.attributes.position.needsUpdate=true;
  });
}

// =====================================================
// HUD UPDATES
// =====================================================
function refreshHUD(){
  document.getElementById('loc-name').textContent=ST.locName||'—';
  document.getElementById('loc-coords').textContent=ST.lat?ST.lat.toFixed(4)+'°, '+ST.lon.toFixed(4)+'°':'—';
  var cnt=ST.storms.length;
  document.getElementById('storm-count').textContent=cnt?cnt+' cell'+(cnt!==1?'s':''):'Clear';
  var sig=ST.storms.filter(function(s){return s.dbz>=35;});
  if(sig.length){
    var n=sig[0];
    var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    var d=dirs[Math.round(n.bearing/22.5)%16];
    document.getElementById('nearest-threat').textContent=Math.round(n.dbz)+' dBZ · '+Math.round(n.distance)+'mi '+d;
    document.getElementById('nearest-threat').style.color=dbzHex(n.dbz);
  } else {
    document.getElementById('nearest-threat').textContent='No active cells';
    document.getElementById('nearest-threat').style.color='rgba(255,255,255,0.45)';
  }
  var w=ST.weather;
  if(w){
    var dirs2=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    var wd=dirs2[Math.round((w.wind_direction_10m||0)/22.5)%16];
    var ws=(w.wind_speed_10m||0);var wsMph=(ws*2.237).toFixed(0);
    document.getElementById('wind-info').textContent=wd+' '+wsMph+'mph'+(ST.cloudCover?' · '+ST.cloudCover+'% cloud':'');
  }
  if(ST.scanTime){
    var sd=new Date(ST.scanTime);
    document.getElementById('scan-footer').textContent=
      'Last scan '+sd.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+(ST.useNexrad?'NEXRAD (IEM)':'RainViewer')+(ST.storms.length?' · '+ST.storms.length+' cells':'');
  }
}

function refreshAlerts(){
  var bar=document.getElementById('alerts-bar'),ticker=document.getElementById('alerts-ticker');
  if(!ST.alerts||!ST.alerts.length){bar.style.display='none';return;}
  var sev=ST.alerts.some(function(a){return a.severity==='Severe'||a.severity==='Extreme';});
  bar.style.background=sev?'rgba(210,20,20,0.92)':'rgba(175,80,5,0.88)';
  bar.style.display='block';
  var txt=ST.alerts.map(function(a){return'⚠ '+a.event+(a.headline?' — '+a.headline.substring(0,80):'');}).join('   ·   ');
  ticker.textContent=txt;
  ticker.style.animation='none';
  requestAnimationFrame(function(){ticker.style.animation='ticker 22s linear infinite';});
}

// =====================================================
// POPUP (click on storm)
// =====================================================
function openPopup(cell,cx,cy){
  var cat=dbzCat(cell.dbz);
  document.getElementById('pop-cat').textContent=cat.name;document.getElementById('pop-cat').style.color=cat.col;
  document.getElementById('pop-dbz').textContent=Math.round(cell.dbz)+' dBZ';document.getElementById('pop-dbz').style.color=cat.col;
  var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  var d=dirs[Math.round(cell.bearing/22.5)%16];
  var dkm=haversineKm(ST.lat,ST.lon,cell.lat,cell.lon);
  var rows='';
  rows+='<div class="pop-row"><span class="pop-k">Distance</span><span class="pop-v">'+Math.round(cell.distance)+' mi ('+Math.round(dkm)+' km)</span></div>';
  rows+='<div class="pop-row"><span class="pop-k">Direction</span><span class="pop-v">'+d+' ('+Math.round(cell.bearing)+'°)</span></div>';
  if(ST.stormMovement&&ST.stormMovement.speed>1.5){
    var mv=ST.stormMovement;
    var md=dirs[Math.round(mv.direction/22.5)%16];
    rows+='<div class="pop-row"><span class="pop-k">Storm Motion</span><span class="pop-v">'+md+' '+mv.speed.toFixed(0)+' mph</span></div>';
    var bearU=(cell.bearing+180)%360;
    var diff=Math.abs(((mv.direction-bearU+180)%360)-180);
    if(diff<75){
      var closing=mv.speed*Math.cos(diff*Math.PI/180);
      if(closing>1){
        var etaM=Math.round(dkm/(closing*1.609/60));
        rows+='<div class="pop-row"><span class="pop-k">ETA</span><span class="pop-v" style="color:#ffd050">'+etaM+' min</span></div>';
      }
    } else {
      rows+='<div class="pop-row"><span class="pop-k">ETA</span><span class="pop-v" style="color:#555">Not approaching</span></div>';
    }
  }
  rows+='<div class="pop-row"><span class="pop-k">Lat / Lon</span><span class="pop-v">'+cell.lat.toFixed(3)+'°, '+cell.lon.toFixed(3)+'°</span></div>';
  if(cell.count&&cell.count>1)rows+='<div class="pop-row"><span class="pop-k">Coverage</span><span class="pop-v">~'+cell.count+' pixels</span></div>';
  document.getElementById('pop-rows').innerHTML=rows;
  var popup=document.getElementById('popup');
  var pw=220,ph=200;
  popup.style.left=Math.min(cx,window.innerWidth-pw-12)+'px';
  popup.style.top=Math.min(cy,window.innerHeight-ph-12)+'px';
  popup.style.display='block';
}

function onCanvasClick(e){
  var rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var meshList=[];
  stormMeshes.forEach(function(sm){sm.mesh.traverse(function(c){if(c.isMesh)meshList.push(c);});});
  var hits=raycaster.intersectObjects(meshList,false);
  if(hits.length){
    var hitObj=hits[0].object;
    var found=null;
    stormMeshes.forEach(function(sm){sm.mesh.traverse(function(c){if(c===hitObj)found=sm;});});
    if(found)openPopup(found.cell,e.clientX,e.clientY);
  } else {
    document.getElementById('popup').style.display='none';
  }
}

// =====================================================
// RENDER LOOP
// =====================================================
var frame=0;
function loop(){
  requestAnimationFrame(loop);
  frame++;
  controls.update();

  var surfWind=ST.weather?ST.weather.wind_direction_10m||0:0;
  stormMeshes.forEach(function(sm){
    animRain(sm.rain,surfWind);
    // gentle cloud drift
    sm.mesh.position.y+=Math.sin(frame*0.015+sm.mesh.id)*0.0002;
  });

  if(frame%2===0)animWind();
  if(frame%3600===0)refreshSky();

  renderer.render(scene,camera);
}

// =====================================================
// INIT
// =====================================================
async function startup(){
  initScene();
  loop();

  // GPS
  document.getElementById('loading-sub').textContent='Requesting GPS…';
  var gpsOk=await new Promise(function(res){
    if(!navigator.geolocation)return res(false);
    navigator.geolocation.getCurrentPosition(
      async function(pos){
        ST.lat=pos.coords.latitude;ST.lon=pos.coords.longitude;
        document.getElementById('loading-sub').textContent='Geocoding…';
        ST.locName=await geocodeReverse(ST.lat,ST.lon);
        res(true);
      },
      function(){res(false);},
      {timeout:10000,enableHighAccuracy:true}
    );
  });

  if(!gpsOk){
    // Show location search
    document.getElementById('loading').style.display='none';
    var lo=document.getElementById('loc-overlay');lo.style.display='flex';
    var inp=document.getElementById('loc-input');
    var sugg=document.getElementById('loc-suggestions');
    var doSearch=async function(){
      var q=inp.value.trim();if(!q)return;
      document.getElementById('loc-btn').textContent='Searching…';
      var results=await geocodeSearch(q);
      document.getElementById('loc-btn').textContent='Search';
      sugg.innerHTML='';
      results.forEach(function(r){
        var div=document.createElement('div');div.className='loc-sug';
        div.textContent=r.display_name.substring(0,65)+'…';
        div.onclick=async function(){
          ST.lat=parseFloat(r.lat);ST.lon=parseFloat(r.lon);
          ST.locName=r.display_name.split(',')[0];
          lo.style.display='none';
          document.getElementById('loading').style.display='flex';
          document.getElementById('loading-sub').textContent='Scanning radar…';
          await runScan();
          document.getElementById('loading').style.display='none';
        };
        sugg.appendChild(div);
      });
    };
    document.getElementById('loc-btn').onclick=doSearch;
    inp.addEventListener('keyup',function(e){if(e.key==='Enter')doSearch();});
    return;
  }

  document.getElementById('loading-sub').textContent='Scanning radar…';
  await runScan();
  document.getElementById('loading').style.display='none';

  // Buttons
  document.getElementById('btn-scan').onclick=function(){runScan();};
  document.getElementById('popup-close').onclick=function(){document.getElementById('popup').style.display='none';};

  // Auto-rescan every 5 min
  setInterval(runScan,5*60*1000);
}

startup();
</script>
