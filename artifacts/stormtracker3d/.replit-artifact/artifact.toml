kind = "web"
previewPath = "/"
title = "StormTracker 3D"
version = "1.0.0"
id = "artifacts/stormtracker3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25551

[services.development]
run = "pnpm --filter @workspace/stormtracker3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stormtracker3d", "run", "build" ]
publicDir = "artifacts/stormtracker3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25551"
BASE_PATH = "/"
